<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNORMA Business Logo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            padding: 40px;
        }

        .logo-container {
            width: 500px;
            height: 500px;
            background: #0a0604;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 0;
        }

        .brand-text {
            font-family: 'Cormorant', serif;
            font-size: 72px;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: white;
            margin-bottom: 20px;
        }

        .decorative-line {
            width: 120px;
            height: 1px;
            background: white;
            opacity: 0.6;
        }

        /* Decorative corners */
        .corner-top-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
        }

        .corner-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 60px;
            transform: rotate(180deg);
        }

        .instructions {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-family: 'Cormorant', serif;
        }

        .instructions p {
            margin: 10px 0;
        }

        .instructions code {
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="logo-container">
            <h1 class="brand-text">UNORMA</h1>
            <div class="decorative-line"></div>

            <!-- Top left corner -->
            <svg class="corner-top-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0 0 L 100 0 L 100 20 L 20 20 L 20 100 L 0 100 Z" fill="white" opacity="0.1" />
            </svg>

            <!-- Bottom right corner -->
            <svg class="corner-bottom-right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0 0 L 100 0 L 100 20 L 20 20 L 20 100 L 0 100 Z" fill="white" opacity="0.1" />
            </svg>
        </div>

        <div class="instructions">
            <p><strong>비즈니스 이미지 사용 방법:</strong></p>
            <p>1. 화면을 스크린샷으로 캡처하세요 (500x500px)</p>
            <p>2. 또는 브라우저 개발자도구에서 <code>.logo-container</code> 요소를 이미지로 저장하세요</p>
            <p>3. 카카오 비즈니스 프로필 이미지로 업로드하세요</p>
        </div>
    </div>
</body>
</html>
